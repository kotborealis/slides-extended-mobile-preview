name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run check

      - name: Package plugin
        run: |
          rm -rf release
          mkdir -p release
          cp manifest.json main.js styles.css release/
          cp -R assets release/assets
          cd release
          zip -r ../slides-extended-mobile-preview.zip .

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: slides-extended-mobile-preview
          path: release/slides-extended-mobile-preview.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: release/slides-extended-mobile-preview.zip
          generate_release_notes: true