name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run check

      - name: Verify generated files are committed
        run: git diff --exit-code -- main.js assets/reveal

      - name: Package plugin
        run: |
          rm -rf release
          mkdir -p release/slides-extended-mobile-preview
          cp manifest.json main.js styles.css release/slides-extended-mobile-preview/
          cp -R assets release/slides-extended-mobile-preview/assets
          cd release
          zip -r slides-extended-mobile-preview.zip slides-extended-mobile-preview

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: slides-extended-mobile-preview
          path: release/slides-extended-mobile-preview.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/slides-extended-mobile-preview.zip
          generate_release_notes: true
